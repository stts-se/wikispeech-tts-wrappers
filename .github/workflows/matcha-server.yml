# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Matcha server

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        cd matcha_server
        curl -LsSf https://astral.sh/uv/install.sh | sh
        sudo apt install espeak-ng
        python -m pip install --upgrade pip
        pip install flake8 pytest

        # Pre-packaged Matcha
        # uv venv --python 3.10
        # source .venv/bin/activate
        # uv pip install -r requirements.txt
        # uv pip install Matcha-TTS==0.0.7.2
        # bash patch.sh

        # Install Matcha from source
        uv venv
        source .venv/bin/activate
        uv pip install -r requirements.txt
        git clone https://github.com/stts-se/Matcha-TTS $HOME/Matcha-TTS
        uv pip install -e $HOME/Matcha-TTS
        bash patch.sh


    - name: Lint with flake8
      run: |
        cd matcha_server
        source .venv/bin/activate
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --bug-report --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --bug-report --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --extend-ignore=E501,E266

    #- name: Run pytest
    #  run: |
    #    pytest
    
    - name: Fetch models
      run: |
        mkdir -p $HOME/.local/share/matcha_tts
        cd $HOME/.local/share/matcha_tts
        curl -f -L https://github.com/shivammehta25/Matcha-TTS-checkpoints/releases/download/v1.0/generator_v1 -o hifigan_T2_v1
        curl -f -L https://github.com/shivammehta25/Matcha-TTS-checkpoints/releases/download/v1.0/g_02500000 -o hifigan_univ_v1
        curl -f -L https://github.com/shivammehta25/Matcha-TTS-checkpoints/releases/download/v1.0/matcha_ljspeech.ckpt -o matcha_ljspeech.ckpt
        curl -f -L https://github.com/shivammehta25/Matcha-TTS-checkpoints/releases/download/v1.0/matcha_vctk.ckpt -o matcha_vctk.ckpt

    - name: Start server
      run: |
        cd matcha_server
        source .venv/bin/activate
        uvicorn matcha_server:app --env-file config_minimal.env --port 8009 &> matcha.log &
        sleep 30

    - name: Ping server
      run: |
        curl -f http://localhost:8009/ping || cat matcha.log

    - name: Load voices
      run: |
        curl -f http://localhost:8009/load_all || cat matcha.log

    - name: Log
      run: cat matcha.log

