# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: DP server

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        cd deep_phonemizer_server
        python -m pip install --upgrade pip
        pip install flake8 pytest
        python -m venv .venv
        source .venv/bin/activate
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        # workaround for pytortch
        sed -i 's/checkpoint = torch.load(checkpoint_path, map_location=device)/checkpoint = torch.load(checkpoint_path, map_location=device, weights_only=False)/' .venv/lib/python3.*/site-packages/dp/model/model.py
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        cd deep_phonemizer_server
        source .venv/bin/activate
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --bug-report --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --bug-report --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --extend-ignore=E501,E266
    #- name: Test with pytest
    #  run: |
    #    pytest
    - name: Fetch models
      run: |
        mkdir -p $HOME/.local/share/deep_phonemizer
        cd $HOME/.local/share/deep_phonemizer
        wget https://public-asai-dl-models.s3.eu-central-1.amazonaws.com/DeepPhonemizer/en_us_cmudict_ipa_forward.pt
    - name: Start server
      run: |
        cd deep_phonemizer_server
        source .venv/bin/activate
        uvicorn dp_server:app --env-file config_minimal.env --port 8008 &
    - name: Ping server
      run: |
        cd deep_phonemizer_server
        curl http://localhost:8008/ping
